schema: 1
name: spectask
version: "1.2.0"

folders:
  spec/tasks:
    mode: artifact
  spec/seeds:
    mode: artifact

agent-ignore:
  - spec/seeds/**/_DONE_*/
  - spec/seeds/**/_DONE_*/**
  - spec/tasks/**/_DONE_*/
  - spec/tasks/**/_DONE_*/**

files:
  spec/main.md:
    description: "Spec-Tasks methodology — folder structure, seven-step process, overview template."
    mode: static
    globalRead: auto
    localRead: required
  spec/design/hla.md:
    description: "Project high-level architecture; updated in Step 7."
    mode: artifact
    globalRead: auto
    localRead: auto
  spec/design.yaml:
    description: "Index of architecture documents under spec/design/ — path and description per entry."
    mode: artifact
    globalRead: auto
    localRead: required

skills:
  spectask-create.md:
    name: spectask-create
    description: "Use when drafting a new spectask (specification only, per spec/main.md)."
  spectask-spec-review-passed.md:
    name: spectask-spec-review-passed
    description: "Step 3 — spec approved (spec/main.md)."
  spectask-execute.md:
    name: spectask-execute
    description: "Steps 4–5 in spec/main.md; then wait for user Step 6."
  spectask-code-review-passed.md:
    name: spectask-code-review-passed
    description: "After user confirms code review — Steps 6–7 in one run (spec/main.md)."
  spectask-design.md:
    name: spectask-design
    description: "Use when registering architecture files in spec/design.yaml or drafting spec/design/*.md."
  spectask-seed-create.md:
    name: spectask-seed-create
    description: "Capture a rough idea as spec/seeds/{X}-{slug}.md (not a full task); then offer to start spectask-create."
