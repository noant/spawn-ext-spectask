schema: 1
version: 0.1.1
name: extension-creator

files:
  spawn-ext-guide/user-guide.md:
    description: Human-readable standalone guide — narrative for all authoring topics.
    mode: static
    globalRead: no
    localRead: no
  spawn-ext-guide/ai/core.md:
    description: Machine baseline — terms, extsrc tree rules, static vs artifact, name and uniqueness, install outputs.
    mode: static
    globalRead: no
    localRead: required
  spawn-ext-guide/ai/config-yaml.md:
    description: Machine schema for config.yaml — keys, files/folders/skills modes, reads, ignores, setup, annotated example.
    mode: static
    globalRead: no
    localRead: auto
  spawn-ext-guide/ai/skill-sources.md:
    description: Machine rules for extsrc/skills/*.md — frontmatter, name/description resolution, rendered skill shape, example.
    mode: static
    globalRead: no
    localRead: auto
  spawn-ext-guide/ai/mcp-json.md:
    description: Machine schema for extsrc/mcp.json — servers, transport, env, capabilities, JSON examples.
    mode: static
    globalRead: no
    localRead: auto
  spawn-ext-guide/ai/cli.md:
    description: Machine CLI reference — spawn init/extension/build commands, extensions.yaml bundle shape, authoring checklist.
    mode: static
    globalRead: no
    localRead: auto

folders: {}

skills:
  spawn-ext-bootstrap.md:
    name: spawn-ext-bootstrap
    description: Bootstrap a new Spawn extension repo with extsrc skeleton and stable id.
    required-read:
      - spawn-ext-guide/ai/core.md
      - spawn-ext-guide/ai/cli.md
  spawn-ext-config.md:
    name: spawn-ext-config
    description: Declare config.yaml files/folders/ignores/setup and mirror every path under extsrc/files.
    required-read:
      - spawn-ext-guide/ai/core.md
      - spawn-ext-guide/ai/config-yaml.md
  spawn-ext-skill-sources.md:
    name: spawn-ext-skill-sources
    description: Author extsrc/skills and register them in config with required-read merges.
    required-read:
      - spawn-ext-guide/ai/core.md
      - spawn-ext-guide/ai/config-yaml.md
      - spawn-ext-guide/ai/skill-sources.md
  spawn-ext-mcp.md:
    name: spawn-ext-mcp
    description: Add extsrc/mcp.json using Spawn servers format and safe env placeholders.
    required-read:
      - spawn-ext-guide/ai/core.md
      - spawn-ext-guide/ai/mcp-json.md
  spawn-ext-verify.md:
    name: spawn-ext-verify
    description: Strict check extension layout and smoke-test install in a disposable target.
    required-read:
      - spawn-ext-guide/ai/core.md
      - spawn-ext-guide/ai/cli.md
  spawn-ext-increment-version.md:
    name: spawn-ext-increment-version
    description: Bump extension version in extsrc/config.yaml for releases (semver-oriented guidance).
    required-read:
      - spawn-ext-guide/ai/core.md
      - spawn-ext-guide/ai/config-yaml.md
      - spawn-ext-guide/ai/cli.md
  spawn-methodology-shape.md:
    name: spawn-methodology-shape
    description: Design methodology namespaces, static vs artifact layout, and read surfaces before packing.
    required-read:
      - spawn-ext-guide/ai/core.md
      - spawn-ext-guide/ai/config-yaml.md
      - spawn-ext-guide/user-guide.md

agent-ignore: []
git-ignore: []
setup: {}
